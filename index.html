<style>
:root{color-scheme:dark;--bg:#04070b;--panel:#08111d;--ink:#edf7ff;--muted:#a8b8c8;--line:rgba(255,255,255,.14);--accent:#7fdcff;--warm:#ffcc7a;--rose:#ff5870;--max:1080px;--read:720px;--reader-scale:1}*{box-sizing:border-box}html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}body{margin:0;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 16% 0%,rgba(127,220,255,.16),transparent 30rem),radial-gradient(circle at 86% 8%,rgba(255,88,112,.10),transparent 28rem),linear-gradient(135deg,#04070b,#07121f 50%,#0b1726);line-height:1.7}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(127,220,255,.032) 1px,transparent 1px),linear-gradient(90deg,rgba(127,220,255,.032) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(circle at 50% 18%,black,transparent 74%)}a{color:inherit}.shell{width:min(var(--max),calc(100% - 38px));margin:0 auto;position:relative}.hero{min-height:58vh;display:grid;grid-template-columns:1.05fr .7fr;gap:42px;align-items:center;padding:54px 0 38px}.kicker{color:var(--warm);letter-spacing:.18em;text-transform:uppercase;font-size:12px}.hero h1{margin:10px 0 18px;font-size:clamp(48px,8vw,104px);line-height:.9;letter-spacing:-.075em;text-transform:uppercase}.subtitle{max-width:690px;color:var(--muted);font-size:clamp(18px,2vw,24px);line-height:1.5}.cta{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}.btn,.tool{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.055);color:var(--ink);padding:10px 14px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer;touch-action:manipulation}.btn:hover,.tool:hover{background:rgba(127,220,255,.10)}.visual{position:relative;min-height:340px;border:1px solid var(--line);border-radius:30px;background:linear-gradient(145deg,rgba(12,20,30,.86),rgba(15,36,52,.34));box-shadow:0 28px 80px rgba(0,0,0,.38),inset 0 1px rgba(255,255,255,.08);overflow:hidden}.visual:before{content:"";position:absolute;inset:38px;border:1px solid rgba(127,220,255,.48);border-radius:50%;box-shadow:0 0 0 42px rgba(127,220,255,.03),0 0 0 82px rgba(255,204,122,.018),0 0 76px rgba(127,220,255,.14)}.visual:after{content:"Do not change the compass opening";position:absolute;left:22px;right:22px;bottom:22px;padding:18px;border:1px solid rgba(255,255,255,.15);border-radius:22px;background:rgba(4,7,11,.64);backdrop-filter:blur(14px);font-size:12px;letter-spacing:.15em;text-transform:uppercase}.node{position:absolute;width:10px;height:10px;border-radius:999px;background:var(--ink);box-shadow:0 0 18px var(--accent)}.n0{top:49%;left:50%;background:var(--rose);box-shadow:0 0 18px var(--rose)}.n1{top:16%;left:50%}.n2{top:32%;left:74%}.n3{top:65%;left:74%}.n4{top:81%;left:50%}.n5{top:65%;left:26%}.n6{top:32%;left:26%}.bookbar{position:sticky;top:max(8px,env(safe-area-inset-top));z-index:10;margin:0 auto 34px;border:1px solid var(--line);border-radius:24px;background:rgba(4,7,11,.86);backdrop-filter:blur(18px);box-shadow:0 14px 44px rgba(0,0,0,.25)}.bookbar-inner{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:8px}.toc-scroll{overflow:auto;scrollbar-width:none}.toc-scroll::-webkit-scrollbar{display:none}.toc{display:flex;gap:7px;white-space:nowrap}.toc a{display:inline-flex;text-decoration:none;color:var(--muted);padding:9px 12px;border-radius:999px;font-size:11px;letter-spacing:.10em;text-transform:uppercase}.toc a:hover,.toc a.active{color:white;background:rgba(127,220,255,.10)}.tools{display:flex;gap:7px;flex-wrap:wrap}.status{padding:24px 0 72px;color:var(--muted);font-size:18px}.chapter{display:grid;grid-template-columns:190px minmax(0,1fr);gap:52px;padding:60px 0;border-top:1px solid var(--line);scroll-margin-top:104px}.marker{position:sticky;top:104px;align-self:start;color:var(--muted);font-size:11px;letter-spacing:.20em;text-transform:uppercase}.marker strong{display:block;margin-top:8px;color:var(--accent);font-size:38px;line-height:1;letter-spacing:-.08em}.marker span{display:block;max-width:170px}article{max-width:var(--read)}h2{margin:0 0 26px;font-size:clamp(34px,5vw,64px);line-height:.98;letter-spacing:-.056em}p{margin:0 0 21px;color:var(--muted);font-size:calc(18px * var(--reader-scale));letter-spacing:-.01em;line-height:1.72}p.lead{color:var(--ink);font-size:calc(22px * var(--reader-scale));line-height:1.56}.label-line{margin:30px 0 10px;color:var(--warm);font-size:13px;letter-spacing:.16em;text-transform:uppercase}.formula{margin:26px 0;padding:20px 22px;border:1px solid rgba(127,220,255,.24);border-radius:22px;background:linear-gradient(90deg,rgba(255,88,112,.10),transparent 36%),linear-gradient(145deg,rgba(127,220,255,.12),rgba(12,20,30,.44));font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:clamp(19px,3vw,34px);line-height:1.4;text-align:center;color:white;overflow:auto;-webkit-overflow-scrolling:touch}ul{margin:26px 0 32px;padding:0;display:grid;gap:10px;list-style:none}li{padding:14px 16px;border:1px solid rgba(255,255,255,.13);border-radius:17px;background:rgba(255,255,255,.045);color:var(--ink);font-size:calc(16px * var(--reader-scale));line-height:1.55}hr{border:0;border-top:1px solid var(--line);margin:44px 0}.footer{border-top:1px solid var(--line);padding:40px 0 66px;color:var(--muted);font-size:12px;letter-spacing:.16em;text-transform:uppercase}.error{border:1px solid rgba(255,88,112,.45);border-radius:22px;background:rgba(255,88,112,.08);padding:22px;color:#ffdce2}
@media(max-width:900px){:root{--max:760px;--read:100%}.hero,.chapter{grid-template-columns:1fr}.hero{min-height:auto;padding:38px 0 24px;gap:22px}.visual{min-height:220px;border-radius:24px}.visual:before{inset:28px}.visual:after{font-size:10px;padding:13px;left:14px;right:14px;bottom:14px}.marker{position:static;display:flex;align-items:baseline;gap:10px}.marker strong{font-size:28px}.bookbar-inner{grid-template-columns:1fr}.tools{justify-content:flex-start}.chapter{gap:18px;padding:46px 0;scroll-margin-top:122px}}

<body>
<header class="shell hero"><section><div class="kicker">GitHub Pages ebook edition</div><h1>Theorem Zero</h1><p class="subtitle">A Beginning: how a preserved act becomes mathematical structure.</p><div class="cta"><a class="btn" href="#book">Read the ebook</a><a class="btn" href="theorem_zero_display_law_17_plate_engine.html">Open display engine</a><a class="btn" href="theorem_zero_layperson_book_draft.md">View source manuscript</a></div></section><aside class="visual" aria-label="Abstract sixfold compass construction"><span class="node n0"></span><span class="node n1"></span><span class="node n2"></span><span class="node n3"></span><span class="node n4"></span><span class="node n5"></span><span class="node n6"></span></aside></header>
<nav class="shell bookbar" aria-label="Book navigation"><div class="bookbar-inner"><div class="toc-scroll"><div id="toc" class="toc"><a href="#book">Loading manuscript...</a></div></div><div class="tools"><a class="tool" href="theorem_zero_display_law_17_plate_engine.html">Display</a><button class="tool" id="fontBtn" type="button">Text +</button><button class="tool" id="printBtn" type="button">Print</button><button class="tool" id="topBtn" type="button">Top</button></div></div></nav>
<main id="book" class="shell"><div id="status" class="status">Loading the manuscript.</div></main>
<footer class="shell footer">Theorem Zero - source manuscript rendered as a GitHub Pages ebook</footer>
<script>
const sourceFile='theorem_zero_layperson_book_draft.md';
const book=document.getElementById('book');
const toc=document.getElementById('toc');
const fontBtn=document.getElementById('fontBtn');
const welcome={heading:'Begin Here',level:1,body:'This book begins with a small act.\n\nOpen a compass. Choose a center. Draw a circle. Then keep the compass opening fixed.\n\nEverything that follows begins from that discipline. The hand may move. The point of the compass may move. New marks may appear on the page. But the opening does not change.\n\nThat preserved distance is the first invariant.\n\nAt first, it gives only a circle. Then the circle gives lawful stations. The stations give equal chords. The chords give equilateral triangles. The triangles begin to form a field.\n\nThe field does not arrive all at once. It appears by staying with the same act and seeing what the act makes possible.\n\nA length becomes portable.\n\nA point becomes a station.\n\nA station becomes a place from which the same construction can continue.\n\nA triangle becomes a cell.\n\nA cell becomes a field.\n\nA field becomes something that can be read.\n\nThe purpose of this book is not to rush ahead to advanced language. It is to let mathematics appear from an action simple enough to trust.\n\nThe first rule remains:\n\nDo not change the compass opening.\n\nThat is the door into Theorem Zero.'};
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('topBtn').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
let readerScale=Number(localStorage.getItem('tz-reader-scale')||'1');
function setScale(v){readerScale=v>1.09?1:1.12;document.documentElement.style.setProperty('--reader-scale',String(readerScale));localStorage.setItem('tz-reader-scale',String(readerScale));fontBtn.textContent=readerScale>1?'Text 1x':'Text +';}
setScale(readerScale>1?1.12:1);
fontBtn.addEventListener('click',()=>setScale(readerScale));
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function slug(s,i){return String(i).padStart(2,'0')+'-'+s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,58);}
function inline(s){return esc(s).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>');}
function looksFormula(s){s=s.trim();if(!s||s.length>115)return false;if(/[=^√]/.test(s))return true;if(/\b(sqrt|sin|cos|tan|frac|cdot)\b/i.test(s))return true;if(/^C\(6,\s*3\)\s*=\s*20$/.test(s))return true;if(/^\d+(\s*:\s*[^.]+)+$/.test(s))return true;if(/^\d+\s*[+*\/-]/.test(s))return true;return false;}
function blockHtml(block,isLead){block=block.trim();if(!block)return '';if(block==='---')return '<hr>';let lines=block.split(/\n/).map(x=>x.trim()).filter(Boolean);if(lines.length===1){let s=lines[0];if(s==='---')return '<hr>';if(looksFormula(s))return '<div class="formula">'+inline(s)+'</div>';if(/:$/.test(s)&&s.length<90)return '<p class="label-line">'+inline(s.slice(0,-1))+'</p>';return '<p'+(isLead?' class="lead"':'')+'>'+inline(s)+'</p>';}let short=lines.length>=3&&lines.every(x=>x.length<70&&!/[.!?]$/.test(x));if(short)return '<ul>'+lines.map(x=>'<li>'+inline(x)+'</li>').join('')+'</ul>';return '<p>'+inline(lines.join(' '))+'</p>';}
function renderBlocks(md){let blocks=md.split(/\n\s*\n/);let html=[];let leadDone=false;for(const b of blocks){let h=blockHtml(b,!leadDone);if(h){html.push(h);if(h.startsWith('<p class="lead"'))leadDone=true;}}return html.join('\n');}
function parse(md){md=md.replace(/^\uFEFF/,'').replace(/\r\n/g,'\n');let title='Theorem Zero: A Beginning';let lines=md.split('\n');for(let i=0;i<lines.length;i++){if(lines[i].startsWith('# ')){title=lines[i].replace(/^#\s+/,'').trim();break;}}let matches=[];let re=/^(#{1,2})\s+(.+)$/gm,m;while((m=re.exec(md))){matches.push({idx:m.index,end:re.lastIndex,level:m[1].length,heading:m[2].trim()});}let sections=[welcome];for(let i=0;i<matches.length;i++){let h=matches[i];if(h.heading===title||h.heading==='Subtitle'||h.heading==='Editorial Note')continue;let include=h.level===2||/^Part /.test(h.heading);if(!include)continue;let end=md.length;for(let j=i+1;j<matches.length;j++){if(matches[j].level<=2){end=matches[j].idx;break;}}let body=md.slice(h.end,end).trim();sections.push({heading:h.heading,level:h.level,body});}return{title,sections};}
function render(data){document.title=data.title;let html='';let nav=['<a href="theorem_zero_display_law_17_plate_engine.html">Display</a>'];data.sections.forEach((s,i)=>{let id=slug(s.heading,i);let isPart=/^Part /.test(s.heading);let label=s.heading.replace(/^Step\s+/,'').replace(/^Chapter\s+/,'Ch. ');nav.push('<a href="#'+id+'">'+esc(label)+'</a>');html+='<section class="chapter" id="'+id+'"><div class="marker"><span>'+(isPart?'Part':esc(s.heading.split(':')[0]))+'</span><strong>'+(i===0?'Start':String(i).padStart(2,'0'))+'</strong></div><article><h2>'+esc(s.heading)+'</h2>'+renderBlocks(s.body)+'</article></section>';});toc.innerHTML=nav.join('');book.innerHTML=html;observeNav();}
function observeNav(){let links=[...toc.querySelectorAll('a')].filter(a=>a.getAttribute('href').startsWith('#'));let map=new Map(links.map(a=>[a.getAttribute('href').slice(1),a]));let observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){links.forEach(a=>a.classList.remove('active'));let a=map.get(e.target.id);if(a){a.classList.add('active');a.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});}}})},{rootMargin:'-20% 0px -70% 0px',threshold:0});document.querySelectorAll('.chapter').forEach(s=>observer.observe(s));}
fetch(sourceFile,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Could not load manuscript');return r.text();}).then(md=>render(parse(md))).catch(err=>{book.innerHTML='<div class="error"><strong>Unable to load the manuscript.</strong><br>'+esc(err.message)+'</div>';});
</script>
