<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Theorem Zero — 17 Plate Lawful Display Engine</title>
<style>
:root { color-scheme: dark; --bg: #000408; }
* { box-sizing: border-box; }
html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
body {
  background:
    radial-gradient(circle at 50% 48%, rgba(50, 210, 160, .045), transparent 35rem),
    linear-gradient(135deg, #000205 0%, #00070a 58%, #020710 100%);
}
.stage { width: 100vw; height: 100vh; display: grid; place-items: center; }
svg {
  width: min(100vw, calc(100vh * 1.4516));
  height: min(100vh, calc(100vw / 1.4516));
  display: block;
}
</style>
</head>
<body>
<div class="stage">
<svg id="theorem-zero" viewBox="0 0 900 620" role="img" aria-label="Theorem Zero 17 plate lawful display engine">
  <defs>
    <filter id="fieldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.75" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="activeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.0" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="lockGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="3.0" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="74%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.50" />
    </radialGradient>
  </defs>
  <rect width="900" height="620" fill="#000408" data-object-type="presentational" data-source-layer="rendering" data-role="ground" />
  <g id="modelLayer"></g>
  <g id="provenanceLayer"></g>
  <g id="timelineLayer"></g>
  <g id="renderingLayer"></g>
  <rect width="900" height="620" fill="url(#vignette)" pointer-events="none" data-object-type="presentational" data-source-layer="rendering" data-role="crop-vignette" />
</svg>
</div>

<script>
'use strict';

const SQRT3 = Math.sqrt(3);
const SCREEN = Object.freeze({ w: 900, h: 620, ox: 450, oy: 310, unit: 88 });
const OBJ = Object.freeze({ C: 'constructional', T: 'transformational', P: 'presentational' });
const SRC = Object.freeze({ MODEL: 'model', PROVENANCE: 'provenance', TIMELINE: 'timeline', RENDERING: 'rendering' });
const COLOR = Object.freeze({
  ground: '#000408', field: '#4dff8a', field2: '#a0e6ff', inactive: '#b2ffcc',
  rose: '#ff6f8e', gold: '#ffd36a', circle: '#eaf9ff', sweep: '#c2e6ff', mint: '#84ffd2'
});
const ALLOWED_TYPES = new Set(Object.values(OBJ));
const ALLOWED_SOURCES = new Set(Object.values(SRC));
const PHASES = Object.freeze({
  field: [0.00, 0.10],
  central: [0.10, 0.58],
  pause: [0.58, 0.66],
  finale: [0.66, 1.00]
});

function clamp01(v){ return Math.max(0, Math.min(1, v)); }
function smooth(v){ v = clamp01(v); return v * v * (3 - 2 * v); }
function span(t, a, b){ if (b === a) return t >= b ? 1 : 0; return clamp01((t - a) / (b - a)); }
function key(q,r){ return q + ',' + r; }
function axial(q,r){ return { x: q + r / 2, y: r * SQRT3 / 2, q, r, id: key(q,r) }; }
function dist(a,b){ return Math.hypot(a.x - b.x, a.y - b.y); }
function project(p){ return { x: SCREEN.ox + SCREEN.unit * p.x, y: SCREEN.oy - SCREEN.unit * p.y }; }
function lerpPoint(a,b,t){ t = clamp01(t); return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; }
function inViewPoint(p, pad){ const s = project(p); return s.x > -pad && s.x < SCREEN.w + pad && s.y > -pad && s.y < SCREEN.h + pad; }
function svgEl(name, attrs, parent){ const n = document.createElementNS('http://www.w3.org/2000/svg', name); for(const [k,v] of Object.entries(attrs || {})) n.setAttribute(k, String(v)); parent.appendChild(n); return n; }
function mod(a,b){ return ((a % b) + b) % b; }
function uniqueById(list){ const seen = new Set(); const out = []; for(const item of list){ if(!item || seen.has(item.id)) continue; seen.add(item.id); out.push(item); } return out; }

class ModelLayer {
  constructor(range){
    this.range = range;
    this.points = new Map();
    this.edges = [];
    this.cells = [];
    this.named = {};
    this.unitCircles = [];
    this.build();
  }
  build(){
    for(let q = -this.range; q <= this.range; q++){
      for(let r = -this.range; r <= this.range; r++) this.points.set(key(q,r), Object.freeze(axial(q,r)));
    }
    for(const p of this.points.values()){
      for(const [dq,dr] of [[1,0],[0,1],[1,-1]]){
        const n = this.point(p.q + dq, p.r + dr);
        if(n) this.edges.push(Object.freeze({ id:'edge:' + p.id + ':' + n.id, a:p, b:n, kind:'unit-edge', law:'triangular-lattice-neighbor' }));
      }
      const right = this.point(p.q + 1, p.r);
      const up = this.point(p.q, p.r + 1);
      const down = this.point(p.q + 1, p.r - 1);
      if(right && up) this.cells.push(Object.freeze({ id:'cell-up:' + p.id, origin:p, orientation:'up', pts:[p,right,up], kind:'equilateral-cell', law:'unit-equilateral-cell' }));
      if(right && down) this.cells.push(Object.freeze({ id:'cell-down:' + p.id, origin:p, orientation:'down', pts:[p,down,right], kind:'equilateral-cell', law:'unit-equilateral-cell' }));
    }
    this.name('O', 0, 0);
    this.name('A', -1, 0);
    this.name('B', -1, 1);
    this.name('C', 0, 1);
    this.name('D', 1, 0);
    this.name('E', 1, -1);
    this.name('F', 0, -1);
    this.circle('circle:O', this.named.O);
    this.circle('circle:A', this.named.A);
  }
  point(q,r){ return this.points.get(key(q,r)) || null; }
  name(id,q,r){ const p = this.point(q,r); this.named[id] = Object.freeze({ id, q, r, x:p.x, y:p.y, kind:'lawful-point', law:'named-lattice-station' }); return this.named[id]; }
  circle(id, center){ const c = Object.freeze({ id, center, radius:1, kind:'unit-circle', law:'fixed-unit-radius' }); this.unitCircles.push(c); return c; }
  ephemeralCircle(id, center){ return Object.freeze({ id, center, radius:1, kind:'unit-circle', law:'fixed-unit-radius' }); }
  cellAt(q,r,orientation){ return this.cells.find(c => c.origin.q === q && c.origin.r === r && c.orientation === orientation) || null; }
  ring(center){
    return uniqueById([
      this.point(center.q - 1, center.r), this.point(center.q - 1, center.r + 1), this.point(center.q, center.r + 1),
      this.point(center.q + 1, center.r), this.point(center.q + 1, center.r - 1), this.point(center.q, center.r - 1)
    ]);
  }
  circleCircle(c1,c2){
    const a = c1.center, b = c2.center, d = dist(a,b);
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2, h = Math.sqrt(1 - (d / 2) ** 2);
    const ux = -(b.y - a.y) / d, uy = (b.x - a.x) / d;
    const candidates = [{x: mx + h * ux, y: my + h * uy}, {x: mx - h * ux, y: my - h * uy}];
    return candidates.map((p,i) => {
      let found = null;
      for(const lp of this.points.values()) if(Math.abs(lp.x - p.x) < 1e-8 && Math.abs(lp.y - p.y) < 1e-8) found = lp;
      return Object.freeze({ id:(i===0?'I-upper:':'I-lower:') + c1.center.id + ':' + c2.center.id, x:found.x, y:found.y, q:found.q, r:found.r, kind:'lawful-point', law:'unit-circle-circle-intersection' });
    });
  }
  fieldCenters(step){
    const out = [];
    for(const p of this.points.values()){
      if(!inViewPoint(p, 120)) continue;
      if(mod(p.q - p.r, step) === 0) out.push(p);
    }
    out.sort((a,b) => dist(a, this.named.O) - dist(b, this.named.O));
    return out;
  }
  upCellsInView(){ return this.cells.filter(c => c.orientation === 'up' && c.pts.every(p => inViewPoint(p, 40))).sort((a,b) => dist(a.origin,this.named.O) - dist(b.origin,this.named.O)); }
  bodiesHexCenters(step){ return this.fieldCenters(step).filter(p => this.ring(p).length === 6); }
}

class ProvenanceLayer {
  constructor(){ this.records = []; }
  record(id, objectType, sourceLayer, note){ this.records.push(Object.freeze({ id, objectType, sourceLayer, note })); }
  all(){ return this.records.slice(); }
}

class TimelineLayer {
  constructor(plates){ this.plates = plates; this.total = plates.reduce((s,p) => s + p.duration, 0); this.start = performance.now(); this.held = null; }
  sample(now){
    if(this.held) return this.held;
    let elapsed = ((now - this.start) / 1000) % this.total;
    for(let i = 0; i < this.plates.length; i++){
      const plate = this.plates[i];
      if(elapsed <= plate.duration) return { plateIndex:i, plate, t:clamp01(elapsed / plate.duration) };
      elapsed -= plate.duration;
    }
    return { plateIndex:this.plates.length - 1, plate:this.plates[this.plates.length - 1], t:1 };
  }
  hold(plateIndex,t){ this.held = { plateIndex, plate:this.plates[plateIndex], t:clamp01(t) }; }
  resume(){ this.held = null; this.start = performance.now(); }
}

class RenderingLayer {
  constructor(model){
    this.model = model;
    this.svg = document.getElementById('theorem-zero');
    this.modelLayer = document.getElementById('modelLayer');
    this.provenanceLayer = document.getElementById('provenanceLayer');
    this.timelineLayer = document.getElementById('timelineLayer');
    this.renderingLayer = document.getElementById('renderingLayer');
  }
  clear(){ this.modelLayer.textContent = ''; this.provenanceLayer.textContent = ''; this.timelineLayer.textContent = ''; this.renderingLayer.textContent = ''; }
  layer(sourceLayer){ if(sourceLayer === SRC.MODEL) return this.modelLayer; if(sourceLayer === SRC.PROVENANCE) return this.provenanceLayer; if(sourceLayer === SRC.TIMELINE) return this.timelineLayer; return this.renderingLayer; }
  emit(name, attrs, meta){
    if(!meta || !ALLOWED_TYPES.has(meta.objectType)) throw new Error('Rendered object missing lawful objectType.');
    if(!ALLOWED_SOURCES.has(meta.sourceLayer)) throw new Error('Rendered object missing sourceLayer.');
    return svgEl(name, Object.assign({}, attrs, {
      'data-object-type': meta.objectType,
      'data-source-layer': meta.sourceLayer,
      'data-role': meta.role || 'unspecified',
      'data-law': meta.law || 'display-law',
      'data-proof-condition': meta.proofCondition || 'unspecified-proof',
      'data-instance-kind': meta.instanceKind || 'unspecified',
      'data-plate-id': meta.plateId || 'unknown-plate'
    }), this.layer(meta.sourceLayer));
  }
  field(alpha){
    alpha = clamp01(alpha);
    const g = this.emit('g', { opacity:alpha, filter:'url(#fieldGlow)' }, { objectType:OBJ.C, sourceLayer:SRC.MODEL, role:'bedrock-field', law:'triangular-lattice', proofCondition:'substrate-law', instanceKind:'shared', plateId:'shared' });
    for(const e of this.model.edges){
      const a = project(e.a), b = project(e.b);
      if(Math.max(a.x,b.x) < -5 || Math.min(a.x,b.x) > SCREEN.w + 5 || Math.max(a.y,b.y) < -5 || Math.min(a.y,b.y) > SCREEN.h + 5) continue;
      svgEl('line', { x1:a.x, y1:a.y, x2:b.x, y2:b.y, stroke:COLOR.field, 'stroke-opacity':'0.30', 'stroke-width':'0.95', 'stroke-linecap':'round', 'data-object-type':OBJ.C, 'data-source-layer':SRC.MODEL, 'data-role':'unit-edge', 'data-law':e.law, 'data-proof-condition':'substrate-law', 'data-instance-kind':'shared', 'data-plate-id':'shared' }, g);
    }
    const dots = this.emit('g', { opacity:alpha * 0.58 }, { objectType:OBJ.C, sourceLayer:SRC.MODEL, role:'lawful-stations', law:'triangular-lattice-points', proofCondition:'substrate-law', instanceKind:'shared', plateId:'shared' });
    for(const p of this.model.points.values()){
      const s = project(p);
      if(s.x < -5 || s.x > SCREEN.w + 5 || s.y < -5 || s.y > SCREEN.h + 5) continue;
      svgEl('circle', { cx:s.x, cy:s.y, r:'1.35', fill:COLOR.inactive, 'fill-opacity':'0.58', 'data-object-type':OBJ.C, 'data-source-layer':SRC.MODEL, 'data-role':'inactive-station', 'data-law':'lawful-lattice-point', 'data-proof-condition':'substrate-law', 'data-instance-kind':'shared', 'data-plate-id':'shared' }, dots);
    }
  }
  dimmer(opacity){ if(opacity > 0) this.emit('rect', { width:SCREEN.w, height:SCREEN.h, fill:'#000408', opacity:clamp01(opacity), 'pointer-events':'none' }, { objectType:OBJ.P, sourceLayer:SRC.RENDERING, role:'field-dim', law:'presentation-only', proofCondition:'presentation-only', instanceKind:'shared', plateId:'shared' }); }
  point(p, color, r, opacity, meta){ const s = project(p); this.emit('circle', { cx:s.x, cy:s.y, r, fill:color, 'fill-opacity':opacity, filter:'url(#activeGlow)' }, meta); }
  edge(a,b,progress,color,width,opacity,dash,meta){ const end = lerpPoint(a,b,progress); const A = project(a), B = project(end); this.emit('line', { x1:A.x, y1:A.y, x2:B.x, y2:B.y, stroke:color, 'stroke-opacity':opacity, 'stroke-width':width, 'stroke-linecap':'round', 'stroke-dasharray':dash || 'none', filter:'url(#lockGlow)' }, meta); }
  segment(a,b,color,width,opacity,dash,meta){ const A = project(a), B = project(b); this.emit('line', { x1:A.x, y1:A.y, x2:B.x, y2:B.y, stroke:color, 'stroke-opacity':opacity, 'stroke-width':width, 'stroke-linecap':'round', 'stroke-dasharray':dash || 'none', filter:'url(#lockGlow)' }, meta); }
  circle(c,progress,color,width,opacity,dash,meta){
    const p = project(c.center);
    const circumference = 2 * Math.PI * SCREEN.unit;
    this.emit('circle', { cx:p.x, cy:p.y, r:SCREEN.unit * (c.radius || 1), fill:'none', stroke:color, 'stroke-opacity':opacity, 'stroke-width':width, 'stroke-dasharray':dash || (circumference + ' ' + circumference), 'stroke-dashoffset':dash ? '0' : String(circumference * (1 - clamp01(progress))), 'stroke-linecap':'round', transform:'rotate(-90 ' + p.x + ' ' + p.y + ')', filter:'url(#activeGlow)' }, meta);
  }
  polygon(pts,fill,fillOpacity,stroke,strokeOpacity,width,meta){ this.emit('polygon', { points:pts.map(project).map(p => p.x + ',' + p.y).join(' '), fill, 'fill-opacity':fillOpacity, stroke, 'stroke-opacity':strokeOpacity, 'stroke-width':width, filter:'url(#activeGlow)' }, meta); }
  arc(center, radiusUnits, a1, a2, color, width, opacity, meta){
    const p = project(center), R = SCREEN.unit * radiusUnits;
    const s = { x:p.x + R * Math.cos(a1), y:p.y - R * Math.sin(a1) };
    const e = { x:p.x + R * Math.cos(a2), y:p.y - R * Math.sin(a2) };
    const large = Math.abs(a2 - a1) > Math.PI ? 1 : 0;
    this.emit('path', { d:'M ' + s.x + ' ' + s.y + ' A ' + R + ' ' + R + ' 0 ' + large + ' 0 ' + e.x + ' ' + e.y, fill:'none', stroke:color, 'stroke-opacity':opacity, 'stroke-width':width, 'stroke-linecap':'round', filter:'url(#lockGlow)' }, meta);
  }
  exportCurrent(filename){
    const clone = this.svg.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    const data = '<!DOCTYPE svg>\n' + new XMLSerializer().serializeToString(clone);
    const blob = new Blob([data], { type:'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename || 'theorem_zero_frame.svg'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    return data;
  }
}

const model = new ModelLayer(9);
const provenance = new ProvenanceLayer();
const render = new RenderingLayer(model);
const circleO = model.unitCircles.find(c => c.id === 'circle:O');
const circleA = model.unitCircles.find(c => c.id === 'circle:A');
const intersectionsOA = model.circleCircle(circleO, circleA);
const O = model.named.O, A = model.named.A, B = model.named.B, C = model.named.C, D = model.named.D, E = model.named.E, F = model.named.F;

provenance.record('substrate', OBJ.C, SRC.MODEL, 'fixed triangular lattice and lawful point-field');
provenance.record('two-phase-rule', OBJ.T, SRC.TIMELINE, 'central construction then lawful field distribution finale');
provenance.record('final-frame-export', OBJ.P, SRC.RENDERING, 'deterministic final-frame export per plate');

function makeMeta(plate, objectType, sourceLayer, role, law, instanceKind){
  return { objectType, sourceLayer, role, law, proofCondition: plate.proofCondition, instanceKind, plateId: plate.id };
}

function phaseT(t){
  return Object.freeze({
    field: smooth(span(t, PHASES.field[0], PHASES.field[1])),
    central: smooth(span(t, PHASES.central[0], PHASES.central[1])),
    pause: smooth(span(t, PHASES.pause[0], PHASES.pause[1])),
    finale: smooth(span(t, PHASES.finale[0], PHASES.finale[1]))
  });
}

function distributeAcrossField(centers, origin, spread, fn){
  for(let i = 0; i < centers.length; i++){
    const c = centers[i];
    const d = Math.min(8.8, dist(c, origin));
    const local = smooth(span(spread, d / 8.8, d / 8.8 + 0.22));
    if(local > 0) fn(c, local, 0.20 + 0.60 * local, i);
  }
}

function distributeCells(cells, origin, spread, fn){
  for(let i = 0; i < cells.length; i++){
    const cell = cells[i];
    const d = Math.min(8.5, dist(cell.origin, origin));
    const local = smooth(span(spread, d / 8.5, d / 8.5 + 0.21));
    if(local > 0) fn(cell, local, 0.18 + 0.62 * local, i);
  }
}

const unitCenters = model.fieldCenters(3).filter(p => p.id !== O.id && model.point(p.q + 1, p.r));
const equilateralCells = model.upCellsInView().filter(c => !(c.origin.q === -1 && c.origin.r === 0));
const hexCenters = model.bodiesHexCenters(4).filter(p => p.id !== O.id);
const coordinateCenters = model.fieldCenters(4).filter(p => model.point(p.q + 2, p.r + 1));
const rightTriangleOrigins = model.fieldCenters(3).filter(p => model.point(p.q + 2, p.r) && model.point(p.q + 1, p.r + 1));
const bodyCenters = model.bodiesHexCenters(5).filter(p => p.id !== O.id);

function drawUnitCircleInstance(plate, center, progress, intensity, canonical){
  const endpoint = model.point(center.q + 1, center.r);
  if(!endpoint) return;
  const circle = model.ephemeralCircle('unit-circle:' + center.id, center);
  const src = canonical ? SRC.PROVENANCE : SRC.TIMELINE;
  render.point(center, canonical ? COLOR.rose : COLOR.gold, canonical ? 5.4 : 2.8, intensity, makeMeta(plate, OBJ.C, src, 'unit-center', 'lawful-lattice-station', canonical ? 'central' : 'distributed'));
  render.edge(center, endpoint, progress, canonical ? COLOR.gold : COLOR.circle, canonical ? 2.7 : 1.25, 0.76 * intensity, progress < 1 ? '7 8' : 'none', makeMeta(plate, progress < 1 ? OBJ.T : OBJ.C, progress < 1 ? SRC.TIMELINE : src, 'unit-radius', 'fixed-unit-radius', canonical ? 'central' : 'distributed'));
  if(progress > 0.55) render.circle(circle, smooth(span(progress, 0.55, 1)), COLOR.circle, canonical ? 1.95 : 0.75, canonical ? 0.84 * intensity : 0.24 * intensity, canonical ? null : '6 18', makeMeta(plate, progress < 1 ? OBJ.T : OBJ.C, progress < 1 ? SRC.TIMELINE : src, 'unit-circle', 'unit-circle-centered-at-lawful-point', canonical ? 'central' : 'distributed'));
  render.point(endpoint, canonical ? COLOR.gold : COLOR.inactive, canonical ? 4.7 : 2.0, 0.82 * intensity, makeMeta(plate, OBJ.C, src, 'unit-boundary-point', 'adjacent-lawful-station', canonical ? 'central' : 'distributed'));
}

function drawEquilateralInstance(plate, origin, progress, intensity, canonical){
  const a = origin, b = model.point(origin.q + 1, origin.r), c = model.point(origin.q, origin.r + 1);
  if(!a || !b || !c) return;
  const src = canonical ? SRC.PROVENANCE : SRC.TIMELINE;
  if(progress > 0.58) render.polygon([a,b,c], COLOR.mint, (canonical ? 0.11 : 0.040) * intensity * smooth(span(progress, 0.58, 1)), COLOR.mint, (canonical ? 0.55 : 0.23) * intensity, canonical ? 1.75 : 0.85, makeMeta(plate, OBJ.C, src, 'equilateral-cell', 'equilateral-cell-from-equal-radius-intersection', canonical ? 'central' : 'distributed'));
  render.edge(a,b,span(progress,0.00,0.42), COLOR.gold, canonical ? 2.7 : 1.1, 0.82 * intensity, progress < 0.42 ? '7 8' : 'none', makeMeta(plate, progress < 0.42 ? OBJ.T : OBJ.C, progress < 0.42 ? SRC.TIMELINE : src, 'cell-edge-1', 'unit-edge', canonical ? 'central' : 'distributed'));
  render.edge(b,c,span(progress,0.24,0.66), COLOR.gold, canonical ? 2.7 : 1.1, 0.78 * intensity, progress < 0.66 ? '7 8' : 'none', makeMeta(plate, progress < 0.66 ? OBJ.T : OBJ.C, progress < 0.66 ? SRC.TIMELINE : src, 'cell-edge-2', 'unit-edge', canonical ? 'central' : 'distributed'));
  render.edge(c,a,span(progress,0.48,0.90), COLOR.gold, canonical ? 2.7 : 1.1, 0.78 * intensity, progress < 0.90 ? '7 8' : 'none', makeMeta(plate, progress < 0.90 ? OBJ.T : OBJ.C, progress < 0.90 ? SRC.TIMELINE : src, 'cell-edge-3', 'unit-edge', canonical ? 'central' : 'distributed'));
  if(progress > 0.10) render.point(a, canonical ? COLOR.rose : COLOR.inactive, canonical ? 4.6 : 1.9, intensity, makeMeta(plate, OBJ.C, src, 'cell-station-a', 'lawful-lattice-station', canonical ? 'central' : 'distributed'));
  if(progress > 0.34) render.point(b, canonical ? COLOR.rose : COLOR.inactive, canonical ? 4.2 : 1.9, 0.88 * intensity, makeMeta(plate, OBJ.C, src, 'cell-station-b', 'lawful-lattice-station', canonical ? 'central' : 'distributed'));
  if(progress > 0.58) render.point(c, COLOR.gold, canonical ? 4.8 : 2.0, 0.92 * intensity, makeMeta(plate, OBJ.C, src, 'cell-station-c', 'lawful-circle-intersection', canonical ? 'central' : 'distributed'));
}

function drawHexClosureInstance(plate, center, progress, intensity, canonical){
  const ring = model.ring(center);
  if(ring.length !== 6) return;
  const src = canonical ? SRC.PROVENANCE : SRC.TIMELINE;

function makePlate(spec){
  const required = ['index','id','title','concept','duration','proofCondition','central','finale'];
  for(const k of required) if(!(k in spec)) throw new Error('Plate missing required field ' + k);
  return Object.freeze(spec);
}

function drawPlate(plate, t){
  const ph = phaseT(t);
  render.field(0.18 + 0.74 * ph.field + 0.18 * (ph.central + ph.pause + ph.finale));
  if(plate.fieldDim) render.dimmer(plate.fieldDim);
  plate.central({ t:ph.central, rawT:t, phases:ph, render, model, plate });
  if(ph.pause > 0) plate.central({ t:1, rawT:t, phases:ph, render, model, plate });
  if(ph.finale > 0){ render.dimmer(0.02 + 0.04 * ph.finale); plate.central({ t:1, rawT:t, phases:ph, render, model, plate }); plate.finale({ t:ph.finale, rawT:t, phases:ph, render, model, plate }); }
}

  }),
  makePlate({

    central: ({t, plate}) => drawCoordinateInstance(plate, O, 1, 1, t, 1, true),
    finale: ({t, plate}) => distributeAcrossField(coordinateCenters, O, t, (p,local,intensity)=> drawCoordinateInstance(plate, p, 1, 1, local, intensity, false))
  }),
  makePlate({

const timeline = new TimelineLayer(plates);
function draw(sample){ render.clear(); drawPlate(sample.plate, sample.t); }
function loop(now){ draw(timeline.sample(now)); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

window.TheoremZero17 = Object.freeze({
  plates: plates.map(p => ({ index:p.index, id:p.id, title:p.title, concept:p.concept, proofCondition:p.proofCondition, duration:p.duration })),
  provenance: () => provenance.all(),
  holdPlate: (plateIndex, t) => { timeline.hold(plateIndex, t); draw(timeline.sample(performance.now())); },
  resume: () => timeline.resume(),
  exportFrame: (plateIndex, t) => { timeline.hold(plateIndex, t); draw(timeline.sample(performance.now())); const plate = plates[plateIndex]; return render.exportCurrent('theorem_zero_' + plate.id.toLowerCase() + '_t_' + t.toFixed(2) + '.svg'); },
  exportPlateFinalFrame: (plateIndex) => { timeline.hold(plateIndex, 1); draw(timeline.sample(performance.now())); const plate = plates[plateIndex]; return render.exportCurrent('theorem_zero_' + plate.id.toLowerCase() + '_final.svg'); },
  exportCurrentPlateFinalFrame: () => { const sample = timeline.sample(performance.now()); timeline.hold(sample.plateIndex, 1); draw(timeline.sample(performance.now())); return render.exportCurrent('theorem_zero_' + sample.plate.id.toLowerCase() + '_final.svg'); },
  exportAllFinalFrames: () => { const out = []; for(let i = 0; i < plates.length; i++) out.push(window.TheoremZero17.exportPlateFinalFrame(i)); return out; }
});

document.addEventListener('keydown', (event) => {
  if(event.key === 'f' || event.key === 'F') window.TheoremZero17.exportCurrentPlateFinalFrame();
  if(event.key === 'ArrowRight') { const s = timeline.sample(performance.now()); timeline.hold(Math.min(plates.length - 1, s.plateIndex + 1), 1); draw(timeline.sample(performance.now())); }
  if(event.key === 'ArrowLeft') { const s = timeline.sample(performance.now()); timeline.hold(Math.max(0, s.plateIndex - 1), 1); draw(timeline.sample(performance.now())); }
  if(event.key === ' ') window.TheoremZero17.resume();
});
